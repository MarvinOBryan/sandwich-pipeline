# Tell Grafana to load every dashboard JSON from `path` on startup.
# Dashboards in git are the source of truth — edits made through the UI get
# reverted on the next provisioning cycle.
#
# The orchestrator (`pipe.telemetry.local_stack`) sets
# GF_SANDWICH_DASHBOARDS_DIR to the repo's `telemetry-backend/grafana/dashboards`
# before launching grafana-server, so this file stays static.

apiVersion: 1

providers:
  - name: sandwich-pipeline
    orgId: 1
    folder: Sandwich Pipeline
    type: file
    disableDeletion: true
    allowUiUpdates: false
    options:
      path: ${GF_SANDWICH_DASHBOARDS_DIR}
      foldersFromFilesStructure: false
