# Provision the Postgres datasource for the sandwich-pipeline telemetry DB.
#
# Grafana reads this on startup. The `postgres` host name resolves to the
# Postgres container on the docker-compose network. The password lives in the
# GF_DATASOURCES_TELEMETRY_PASSWORD env var (set in docker-compose.yaml) so it
# never lands in git.

apiVersion: 1

datasources:
  - name: telemetry
    type: postgres
    uid: telemetry
    access: proxy
    url: postgres:5432
    user: sandwich-telemetry
    database: sandwich_telemetry
    isDefault: true
    editable: false
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
    secureJsonData:
      password: ${GF_DATASOURCES_TELEMETRY_PASSWORD}
