# Provision the Postgres datasource for the sandwich-pipeline telemetry DB.
#
# The orchestrator (`pipe telemetry up` -> pipe.telemetry.local_stack) sets
# these env vars before launching grafana-server:
#
#   GF_SANDWICH_PG_URL       127.0.0.1:<chosen-port>
#   GF_SANDWICH_PG_PASSWORD  the password the orchestrator generated for
#                            the sandwich-telemetry role on first init
#
# Grafana substitutes ${GF_SANDWICH_PG_URL} / ${GF_SANDWICH_PG_PASSWORD} at
# load time, so this file stays static and the orchestrator owns the moving
# pieces.

apiVersion: 1

datasources:
  - name: telemetry
    type: postgres
    uid: telemetry
    access: proxy
    url: ${GF_SANDWICH_PG_URL}
    user: sandwich-telemetry
    database: sandwich_telemetry
    isDefault: true
    editable: false
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
    secureJsonData:
      password: ${GF_SANDWICH_PG_PASSWORD}
