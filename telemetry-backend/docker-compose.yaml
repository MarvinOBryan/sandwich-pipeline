# Telemetry backend — Postgres + Grafana + ingester.
#
# Run from the `telemetry-backend/` directory:
#   docker compose up -d
#
# Three services:
#   postgres   — stores events. Initialized from postgres/schema.sql on first
#                start. Data lives in the named volume `telemetry-pgdata`.
#   ingester   — tails the shared JSONL spool and inserts into postgres. Built
#                from the repo via Dockerfile.ingester.
#   grafana    — dashboards. Provisions the postgres datasource and the
#                tool_health dashboard from the bind-mounted directories.
#
# Only Grafana is exposed to the host; postgres is internal to the compose
# network.
#
# Configure for your environment by setting these variables in a .env file
# next to this compose file (the file is gitignored at the repo root):
#   POSTGRES_PASSWORD                — password for the sandwich-telemetry user
#   GF_SECURITY_ADMIN_PASSWORD       — initial Grafana admin password
#   PIPE_INGESTER_SPOOL_HOST_PATH    — absolute host path to the shared spool
#                                       (e.g. /mnt/show/.telemetry/raw)
#   GRAFANA_HOST_PORT                — host port to expose Grafana on (default 3000)

name: sandwich-telemetry

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sandwich-telemetry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: sandwich_telemetry
    volumes:
      - telemetry-pgdata:/var/lib/postgresql/data
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandwich-telemetry -d sandwich_telemetry"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingester:
    build:
      context: ..
      dockerfile: telemetry-backend/Dockerfile.ingester
    image: sandwich-telemetry-ingester:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PIPE_INGESTER_SPOOL_ROOT: /mnt/spool
      PIPE_INGESTER_DB_DSN: postgresql://sandwich-telemetry:${POSTGRES_PASSWORD}@postgres:5432/sandwich_telemetry
      PIPE_INGESTER_INTERVAL: "5"
    volumes:
      # Mount the shared NFS spool path read-only. The ingester only reads
      # JSONL files; spool writers are the workstations.
      - ${PIPE_INGESTER_SPOOL_HOST_PATH:?set PIPE_INGESTER_SPOOL_HOST_PATH in .env}:/mnt/spool:ro

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?set GF_SECURITY_ADMIN_PASSWORD in .env}
      GF_DATASOURCES_TELEMETRY_PASSWORD: ${POSTGRES_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - telemetry-grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  telemetry-pgdata:
  telemetry-grafana:
